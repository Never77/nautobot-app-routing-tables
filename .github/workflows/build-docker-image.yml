name: Build Docker Image

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v1.0.0), leave empty for latest'
        required: false
        type: string
  push:
    tags:
      - 'v*'

jobs:
  build:
    permissions:
      contents: read
      packages: write
          
    runs-on: ubuntu-latest
    steps:
    - name: 'Login to GitHub Container Registry'
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Get latest tag
      id: latest_tag
      if: github.event_name == 'workflow_dispatch' && inputs.tag == ''
      run: echo "tag=$(gh api repos/${{ github.repository }}/tags --jq '.[0].name')" >> $GITHUB_OUTPUT
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Get tag from input
      uses: actions/github-script@v8
      id: input_tag
      if: github.event_name == 'workflow_dispatch' && inputs.tag != ''
      env:
        TAG: ${{ inputs.tag }}
      with:
        script: |
          const tag = process.env.TAG
          await github.rest.git.getRef({ owner: context.repo.owner, repo: context.repo.repo, ref: `tags/${tag}` })
            .catch(() => core.setFailed(`Input tag doesn't exist : '${tag}'`))
          core.setOutput('tag', tag)

    - name: Extract metadata (tags, labels) for Docker
      id: meta
      uses: docker/metadata-action@v6
      env:
       TAG: ${{ steps.input_tag.outputs.tag || steps.latest_tag.outputs.tag }}
      with:
        images: ghcr.io/BadPlayers/nautobot-app-routing-tables/nautobot
        tags: |
          # output 0.1.2
          type=semver,pattern={{version}}
          # output 0.1
          type=semver,pattern={{major}}.{{minor}}
          # disabled if major zero
          type=semver,pattern={{major}},enable=${{ !startsWith(github.ref, 'refs/tags/v0.') }}
          # for workflow_dispatch trigger 
          type=semver,pattern={{version}},value=${{ env.TAG }},enable=${{ github.event_name == 'workflow_dispatch' }}

    - name: Build and push nautobot-app-routing-tables image
      uses: docker/build-push-action@v7
      env:
        TAG: ${{ steps.input_tag.outputs.tag || steps.latest_tag.outputs.tag || github.ref }}
      with:
        context: "https://github.com/${{ github.repository }}.git#${{ env.TAG }}"
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        file: docker/Dockerfile
        secrets:
          GIT_AUTH_TOKEN=${{ secrets.GITHUB_TOKEN }}
