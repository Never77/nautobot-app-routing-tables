name: Build Docker Image

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v1.0.0), leave empty for latest'
        required: false
        type: string
  push:
    tags:
      - 'v*'

jobs:
  build:
    permissions:
      contents: read
      packages: write
          
    runs-on: ubuntu-latest
    steps:
    - name: 'Login to GitHub Container Registry'
      uses: docker/login-action@v3.5.0
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Get tag from input
      id: tag_input
      if: github.event_name == 'workflow_dispatch' && inputs.tag != ''
      run: echo "tag=${{ inputs.tag }}" >> $GITHUB_OUTPUT

    - name: Get latest tag
      id: tag_latest
      if: github.event_name == 'workflow_dispatch' && inputs.tag == ''
      run: echo "tag=$(gh api repos/${{ github.repository }}/tags --jq '.[0].name')" >> $GITHUB_OUTPUT
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
   
    - name: Extract metadata (tags, labels) for Docker
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ghcr.io/BadPlayers/nautobot-app-routing-tables/nautobot
        tags: |
          # workflow_dispatch : 
          type=raw,value=${{ steps.tag_input.outputs.tag || steps.tag_latest.outputs.tag }},enable=${{ github.event_name == 'workflow_dispatch' }}
          # output 0.1.2
          type=semver,pattern={{version}}
          # output 0.1
          type=semver,pattern={{major}}.{{minor}}
          # disabled if major zero
          type=semver,pattern={{major}},enable=${{ !startsWith(github.ref, 'refs/tags/v0.') }}

    - name: Build and push nautobot-app-routing-tables image
      uses: docker/build-push-action@v6
      with:
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        file: docker/Dockerfile
